<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" width="100%" height="100%" style="background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="gradApp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradMonitor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradInjector" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradTimer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradHw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c757d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#343a40;stop-opacity:1" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowLight" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.05"/>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowApp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#764ba2"/>
    </marker>
    <marker id="arrowMonitor" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00f2fe"/>
    </marker>
    <marker id="arrowInjector" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38f9d7"/>
    </marker>
    <marker id="arrowTimer" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fa709a"/>
    </marker>
    <marker id="arrowHw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#343a40"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" font-size="24" font-weight="bold" fill="#2d3748" text-anchor="middle" letter-spacing="1">RTL‑base System Architecture</text>

  <!-- ================= LAYER 1: APPLICATION ================= -->
  <g transform="translate(50, 70)" filter="url(#shadow)">
    <rect width="1100" height="100" rx="10" fill="url(#gradApp)" />
    <text x="20" y="30" font-size="18" font-weight="bold" fill="#ffffff">Application Layer</text>
    <text x="20" y="50" font-size="13" fill="#e2e8f0">User Space — Control, Configuration, and Monitoring</text>
    
    <!-- App Sub-modules -->
    <rect x="20" y="65" width="150" height="25" rx="5" fill="#ffffff" fill-opacity="0.2" />
    <text x="95" y="82" font-size="12" fill="#ffffff" text-anchor="middle">Configuration &amp; Control</text>
    
    <rect x="190" y="65" width="120" height="25" rx="5" fill="#ffffff" fill-opacity="0.2" />
    <text x="250" y="82" font-size="12" fill="#ffffff" text-anchor="middle">Statistics &amp; Logging</text>
    
    <rect x="330" y="65" width="120" height="25" rx="5" fill="#ffffff" fill-opacity="0.2" />
    <text x="390" y="82" font-size="12" fill="#ffffff" text-anchor="middle">Callbacks &amp; Sinks</text>
  </g>

  <!-- Arrows: App to Services -->
  <path d="M 200 170 L 200 210" stroke="#764ba2" stroke-width="2" marker-end="url(#arrowApp)" fill="none" stroke-dasharray="4,2"/>
  <path d="M 800 170 L 800 210" stroke="#764ba2" stroke-width="2" marker-end="url(#arrowApp)" fill="none" stroke-dasharray="4,2"/>

  <!-- ================= LAYER 2: MONITOR ENGINE ================= -->
  <g transform="translate(50, 220)" filter="url(#shadow)">
    <rect width="540" height="320" rx="10" fill="#ffffff" stroke="url(#gradMonitor)" stroke-width="3" />
    <rect width="540" height="40" rx="10" fill="url(#gradMonitor)" />
    <text x="20" y="26" font-size="16" font-weight="bold" fill="#ffffff">Monitor Engine (monitor.c)</text>
    <text x="430" y="26" font-size="12" fill="#e2e8f0" text-anchor="end">Promiscuous Capture &amp; Streaming</text>

    <!-- Monitor Pipeline (Left to Right) -->
    <!-- ISR Context -->
    <rect x="15" y="55" width="110" height="50" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="70" y="75" font-size="12" font-weight="bold" fill="#22543d" text-anchor="middle">Promisc Callback</text>
    <text x="70" y="92" font-size="10" fill="#276749" text-anchor="middle">(ISR Context)</text>

    <rect x="145" y="55" width="110" height="50" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="200" y="75" font-size="12" font-weight="bold" fill="#22543d" text-anchor="middle">Lock-Free Pool</text>
    <text x="200" y="92" font-size="10" fill="#276749" text-anchor="middle">(CAS Allocator)</text>

    <rect x="275" y="55" width="110" height="50" rx="6" fill="#f0fff4" stroke="#48bb78" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="330" y="75" font-size="12" font-weight="bold" fill="#22543d" text-anchor="middle">SPSC Ring Buffer</text>
    <text x="330" y="92" font-size="10" fill="#276749" text-anchor="middle">(Lock-Free)</text>

    <!-- Arrows for Pipeline -->
    <path d="M 125 80 L 135 80" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowMonitor)"/>
    <path d="M 255 80 L 265 80" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowMonitor)"/>

    <!-- Task Context (Monitor Task) -->
    <rect x="15" y="125" width="370" height="70" rx="6" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="200" y="145" font-size="12" font-weight="bold" fill="#2c5282" text-anchor="middle">Monitor Task (FreeRTOS)</text>
    
    <rect x="25" y="155" width="105" height="30" rx="4" fill="#ffffff" stroke="#63b3ed" stroke-width="1"/>
    <text x="77" y="174" font-size="11" fill="#2b6cb0" text-anchor="middle">Frame Type Filter</text>
    
    <rect x="140" y="155" width="105" height="30" rx="4" fill="#ffffff" stroke="#63b3ed" stroke-width="1"/>
    <text x="192" y="174" font-size="11" fill="#2b6cb0" text-anchor="middle">MAC Filter</text>

    <rect x="255" y="155" width="120" height="30" rx="4" fill="#ffffff" stroke="#63b3ed" stroke-width="1"/>
    <text x="315" y="174" font-size="11" fill="#2b6cb0" text-anchor="middle">BPF Rules (offset/mask)</text>

    <!-- Radiotap & Writer -->
    <rect x="405" y="125" width="120" height="70" rx="6" fill="#faf5ff" stroke="#805ad5" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="465" y="145" font-size="12" font-weight="bold" fill="#44337a" text-anchor="middle">Radiotap Builder</text>
    <text x="465" y="165" font-size="10" fill="#553c9a" text-anchor="middle">(Header + TSF)</text>

    <path d="M 385 160 L 395 160" stroke="#3182ce" stroke-width="2" marker-end="url(#arrowMonitor)"/>

    <!-- Output Stage -->
    <rect x="15" y="215" width="510" height="85" rx="6" fill="#fffaf0" stroke="#dd6b20" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="30" y="235" font-size="12" font-weight="bold" fill="#9c4221">Output Pipeline</text>

    <rect x="25" y="250" width="140" height="35" rx="4" fill="#ffffff" stroke="#ed8936" stroke-width="1"/>
    <text x="95" y="272" font-size="11" fill="#c05621" text-anchor="middle">Block Pool (32 slots)</text>

    <rect x="185" y="250" width="140" height="35" rx="4" fill="#ffffff" stroke="#ed8936" stroke-width="1"/>
    <text x="255" y="272" font-size="11" fill="#c05621" text-anchor="middle">Writer Task (FreeRTOS)</text>

    <rect x="345" y="250" width="160" height="35" rx="4" fill="#ffffff" stroke="#ed8936" stroke-width="1"/>
    <text x="425" y="272" font-size="11" fill="#c05621" text-anchor="middle">Sink (UART / USB / VFS)</text>

    <path d="M 165 267 L 175 267" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrowMonitor)"/>
    <path d="M 325 267 L 335 267" stroke="#dd6b20" stroke-width="2" marker-end="url(#arrowMonitor)"/>

    <!-- Hopper Task -->
    <rect x="15" y="315" width="510" height="35" rx="6" fill="#fefcbf" stroke="#d69e2e" stroke-width="1" filter="url(#shadowLight)"/>
    <text x="270" y="337" font-size="12" font-weight="bold" fill="#975a16" text-anchor="middle">Adaptive Hopper Task (Traffic‑aware dwell: 50‑300ms)</text>
  </g>

  <!-- ================= LAYER 2: INJECTOR ENGINE ================= -->
  <g transform="translate(620, 220)" filter="url(#shadow)">
    <rect width="530" height="320" rx="10" fill="#ffffff" stroke="url(#gradInjector)" stroke-width="3" />
    <rect width="530" height="40" rx="10" fill="url(#gradInjector)" />
    <text x="20" y="26" font-size="16" font-weight="bold" fill="#ffffff">Injector Engine (inject.c)</text>
    <text x="430" y="26" font-size="12" fill="#e2e8f0" text-anchor="end">Precision Raw Frame Injection</text>

    <!-- Scheduler Core -->
    <rect x="15" y="55" width="500" height="90" rx="6" fill="#f0fff4" stroke="#38a169" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="30" y="75" font-size="12" font-weight="bold" fill="#22543d">CA‑EDF Scheduler Task (Channel‑Aware Earliest Deadline First)</text>

    <rect x="25" y="90" width="140" height="40" rx="4" fill="#ffffff" stroke="#68d391" stroke-width="1"/>
    <text x="95" y="114" font-size="11" fill="#276749" text-anchor="middle">Binary Min‑Heap</text>

    <rect x="185" y="90" width="150" height="40" rx="4" fill="#ffffff" stroke="#68d391" stroke-width="1"/>
    <text x="260" y="107" font-size="11" fill="#276749" text-anchor="middle">Phase Accumulator</text>
    <text x="260" y="121" font-size="10" fill="#276749" text-anchor="middle">(Drift‑free)</text>

    <rect x="355" y="90" width="140" height="40" rx="4" fill="#ffffff" stroke="#68d391" stroke-width="1"/>
    <text x="425" y="114" font-size="11" fill="#276749" text-anchor="middle">Spin‑Wait Precision</text>

    <!-- Injector Manager & Instances -->
    <rect x="15" y="160" width="500" height="80" rx="6" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="30" y="180" font-size="12" font-weight="bold" fill="#2c5282">Injector Manager (Up to 16 concurrent streams)</text>

    <rect x="25" y="195" width="230" height="30" rx="4" fill="#ffffff" stroke="#63b3ed" stroke-width="1"/>
    <text x="140" y="214" font-size="11" fill="#2b6cb0" text-anchor="middle">PacketInjector[n] (Named Instances)</text>

    <rect x="270" y="195" width="110" height="30" rx="4" fill="#ffffff" stroke="#63b3ed" stroke-width="1"/>
    <text x="325" y="214" font-size="11" fill="#2b6cb0" text-anchor="middle">Double Buffering</text>

    <rect x="395" y="195" width="105" height="30" rx="4" fill="#ffffff" stroke="#63b3ed" stroke-width="1"/>
    <text x="447" y="214" font-size="11" fill="#2b6cb0" text-anchor="middle">Mutate Callback</text>

    <!-- TX Control -->
    <rect x="15" y="255" width="500" height="50" rx="6" fill="#faf5ff" stroke="#805ad5" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="30" y="275" font-size="12" font-weight="bold" fill="#44337a">Transmission Control</text>

    <rect x="25" y="285" width="150" height="25" rx="4" fill="#ffffff" stroke="#b794f4" stroke-width="1"/>
    <text x="100" y="302" font-size="11" fill="#553c9a" text-anchor="middle">Channel Switching (EMA)</text>

    <rect x="190" y="285" width="150" height="25" rx="4" fill="#ffffff" stroke="#b794f4" stroke-width="1"/>
    <text x="265" y="302" font-size="11" fill="#553c9a" text-anchor="middle">TX Power Control (dBm)</text>

    <rect x="355" y="285" width="145" height="25" rx="4" fill="#ffffff" stroke="#b794f4" stroke-width="1"/>
    <text x="427" y="302" font-size="11" fill="#553c9a" text-anchor="middle">wifi_send_raw_frame</text>
  </g>

  <!-- ================= LAYER 3: TIMER LIBRARY ================= -->
  <g transform="translate(50, 570)" filter="url(#shadow)">
    <rect width="1100" height="130" rx="10" fill="#ffffff" stroke="url(#gradTimer)" stroke-width="3" />
    <rect width="1100" height="40" rx="10" fill="url(#gradTimer)" />
    <text x="20" y="26" font-size="16" font-weight="bold" fill="#ffffff">Timer Library (timer.c)</text>
    <text x="980" y="26" font-size="12" fill="#e2e8f0" text-anchor="end">Composite Nanosecond Timestamp</text>

    <!-- Timer Sub-modules -->
    <rect x="15" y="55" width="240" height="55" rx="6" fill="#fffaf0" stroke="#dd6b20" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="135" y="75" font-size="12" font-weight="bold" fill="#9c4221" text-anchor="middle">GTimer (Hardware Timer)</text>
    <text x="135" y="95" font-size="11" fill="#c05621" text-anchor="middle">1 µs Coarse Anchor</text>

    <rect x="275" y="55" width="240" height="55" rx="6" fill="#fffaf0" stroke="#dd6b20" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="395" y="75" font-size="12" font-weight="bold" fill="#9c4221" text-anchor="middle">DWT CYCCNT (CPU Cycle Counter)</text>
    <text x="395" y="95" font-size="11" fill="#c05621" text-anchor="middle">~3 ns Fine Interpolation</text>

    <rect x="535" y="55" width="240" height="55" rx="6" fill="#fffaf0" stroke="#dd6b20" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="655" y="75" font-size="12" font-weight="bold" fill="#9c4221" text-anchor="middle">Phase Calibration</text>
    <text x="655" y="95" font-size="11" fill="#c05621" text-anchor="middle">Aligns DWT to GTimer edge</text>

    <rect x="795" y="55" width="280" height="55" rx="6" fill="#fffaf0" stroke="#dd6b20" stroke-width="1.5" filter="url(#shadowLight)"/>
    <text x="935" y="75" font-size="12" font-weight="bold" fill="#9c4221" text-anchor="middle">Wrap Watchdog Task (FreeRTOS)</text>
    <text x="935" y="95" font-size="11" fill="#c05621" text-anchor="middle">Extends 32‑bit DWT to 64‑bit</text>
  </g>

  <!-- ================= LAYER 4: HARDWARE ================= -->
  <g transform="translate(50, 740)" filter="url(#shadow)">
    <rect width="1100" height="100" rx="10" fill="url(#gradHw)" />
    <text x="20" y="30" font-size="16" font-weight="bold" fill="#ffffff">Hardware Layer</text>
    <text x="20" y="50" font-size="13" fill="#ced4da">RTL8721Dx (KM4 Core — Cortex‑M55 @ up to 345 MHz)</text>

    <!-- HW Sub-modules -->
    <rect x="20" y="65" width="200" height="25" rx="5" fill="#ffffff" fill-opacity="0.15" />
    <text x="120" y="82" font-size="12" fill="#ffffff" text-anchor="middle">Radio / Baseband (Wi‑Fi 4)</text>
    
    <rect x="240" y="65" width="150" height="25" rx="5" fill="#ffffff" fill-opacity="0.15" />
    <text x="315" y="82" font-size="12" fill="#ffffff" text-anchor="middle">GTimer (1 MHz)</text>

    <rect x="410" y="65" width="150" height="25" rx="5" fill="#ffffff" fill-opacity="0.15" />
    <text x="485" y="82" font-size="12" fill="#ffffff" text-anchor="middle">DWT Unit (CYCCNT)</text>

    <rect x="580" y="65" width="150" height="25" rx="5" fill="#ffffff" fill-opacity="0.15" />
    <text x="655" y="82" font-size="12" fill="#ffffff" text-anchor="middle">SysTick Timer</text>
  </g>

  <!-- ================= CROSS-LAYER ARROWS ================= -->
  
  <!-- Timer to Monitor -->
  <path d="M 300 700 L 300 560" stroke="#fa709a" stroke-width="3" marker-end="url(#arrowTimer)" fill="none" />
  <rect x="215" y="620" width="170" height="20" rx="4" fill="#ffffff" stroke="#fa709a" stroke-width="1" />
  <text x="300" y="634" font-size="11" fill="#c53030" text-anchor="middle">timer_get_time_ns_isr()</text>

  <!-- Timer to Injector -->
  <path d="M 800 700 L 800 560" stroke="#fa709a" stroke-width="3" marker-end="url(#arrowTimer)" fill="none" />
  <rect x="715" y="620" width="170" height="20" rx="4" fill="#ffffff" stroke="#fa709a" stroke-width="1" />
  <text x="800" y="634" font-size="11" fill="#c53030" text-anchor="middle">timer_spin_until_ns()</text>

  <!-- Radio to Monitor -->
  <path d="M 250 840 L 250 560" stroke="#343a40" stroke-width="3" marker-end="url(#arrowHw)" fill="none" stroke-dasharray="6,3"/>
  <rect x="185" y="690" width="130" height="20" rx="4" fill="#ffffff" stroke="#343a40" stroke-width="1" />
  <text x="250" y="704" font-size="11" fill="#2d3748" text-anchor="middle">Raw 802.11 Frames</text>

  <!-- Injector to Radio -->
  <path d="M 850 840 L 850 560" stroke="#343a40" stroke-width="3" marker-end="url(#arrowHw)" fill="none" stroke-dasharray="6,3"/>
  <rect x="785" y="690" width="130" height="20" rx="4" fill="#ffffff" stroke="#343a40" stroke-width="1" />
  <text x="850" y="704" font-size="11" fill="#2d3748" text-anchor="middle">Injected Frames</text>

  <!-- Legend -->
  <g transform="translate(900, 860)">
    <rect x="0" y="0" width="230" height="80" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="1" filter="url(#shadowLight)"/>
    <text x="115" y="20" font-size="12" font-weight="bold" fill="#4a5568" text-anchor="middle">Legend</text>
    
    <line x1="15" y1="40" x2="45" y2="40" stroke="#764ba2" stroke-width="3" marker-end="url(#arrowApp)"/>
    <text x="55" y="44" font-size="11" fill="#4a5568">API / Control Path</text>
    
    <line x1="15" y1="60" x2="45" y2="60" stroke="#343a40" stroke-width="3" stroke-dasharray="4,2" marker-end="url(#arrowHw)"/>
    <text x="55" y="64" font-size="11" fill="#4a5568">Data / Frame Path</text>
  </g>
</svg>
